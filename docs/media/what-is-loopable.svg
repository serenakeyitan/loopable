<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- user bubble -->
  <rect x="60" y="60" width="780" height="110" rx="30" fill="#f7ccc6" stroke="#111" stroke-width="3"/>
  <text x="100" y="128" font-size="32" fill="#111">ugh, the tests keep flaking again</text>

  <!-- claude bubble -->
  <rect x="140" y="230" width="1260" height="210" rx="30" fill="#bfe8c0" stroke="#111" stroke-width="3"/>
  <text x="180" y="305" font-size="32" fill="#111">you can run:</text>
  <text x="180" y="365" font-size="32" font-weight="bold" fill="#111">/goal all tests pass and lint is clean,</text>
  <text x="180" y="408" font-size="32" font-weight="bold" fill="#111">stop after 20 turns</text>

  <!-- loopable chip -->
  <rect x="1160" y="205" width="240" height="56" rx="28" fill="#f9e9a2" stroke="#111" stroke-width="3"/>
  <text x="1280" y="243" font-size="28" fill="#111" text-anchor="middle">loopable ↻</text>

  <!-- tagline -->
  <text x="800" y="540" font-size="27" fill="#555" text-anchor="middle">a hook that reminds you to use loops — so you don't need to remember any</text>
</svg>
