<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <rect x="0" y="0" width="1400" height="900" fill="#f2efe9"/>

  <!-- corner brackets -->
  <path d="M55 95 v-40 h40" fill="none" stroke="#c63d2f" stroke-width="5"/>
  <path d="M1345 55 h-40 M1345 55 v40" fill="none" stroke="#c63d2f" stroke-width="5"/>
  <path d="M55 805 v40 h40" fill="none" stroke="#c63d2f" stroke-width="5"/>
  <path d="M1345 845 h-40 M1345 845 v-40" fill="none" stroke="#c63d2f" stroke-width="5"/>

  <!-- title -->
  <text x="95" y="195" font-size="105" fill="#161616">loopable</text>
  <rect x="98" y="222" width="290" height="11" fill="#c63d2f"/>
  <text x="1305" y="150" font-size="28" fill="#666" text-anchor="end">free · steal this</text>

  <!-- subtitle -->
  <text x="95" y="300" font-size="32" fill="#444">you forget loops · claude reminds you</text>

  <!-- the exchange -->
  <text x="95" y="450" font-size="30" fill="#999">you</text>
  <text x="265" y="450" font-size="34" fill="#161616">ugh, the tests keep flaking again</text>

  <text x="95" y="560" font-size="30" fill="#999">claude</text>
  <text x="265" y="560" font-size="34" fill="#161616">run: <tspan fill="#c63d2f" font-weight="bold">/goal all tests pass and lint</tspan></text>
  <text x="265" y="610" font-size="34" fill="#c63d2f" font-weight="bold">     is clean, stop after 20 turns</text>

  <!-- footer -->
  <line x1="95" y1="720" x2="1305" y2="720" stroke="#aaa" stroke-width="2.5"/>
  <text x="700" y="780" font-size="27" fill="#333" text-anchor="middle">a hook that reminds you to use loops · so you don't need to remember any</text>
  <text x="700" y="828" font-size="23" fill="#888" text-anchor="middle">claude code &amp; codex · never auto-runs · github.com/serenakeyitan/loopable</text>
</svg>
