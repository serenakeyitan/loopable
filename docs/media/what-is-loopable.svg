<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 650" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <!-- 1. you -->
  <rect x="30" y="90" width="330" height="150" rx="24" fill="#f7ccc6" stroke="#111" stroke-width="3.5"/>
  <text x="58" y="128" font-size="22" fill="#555">you</text>
  <text x="58" y="172" font-size="27" fill="#111">"the tests keep</text>
  <text x="58" y="208" font-size="27" fill="#111"> flaking again"</text>

  <line x1="360" y1="165" x2="412" y2="165" stroke="#111" stroke-width="3.5"/>
  <path d="M418 165 l-16 -9 v18 z" fill="#111"/>

  <!-- 2. loopable hook -->
  <rect x="420" y="75" width="430" height="180" rx="24" fill="#f9e9a2" stroke="#111" stroke-width="3.5"/>
  <text x="448" y="118" font-size="30" fill="#111">loopable ↻  (hook)</text>
  <text x="448" y="162" font-size="24" fill="#111">fires on your message,</text>
  <text x="448" y="196" font-size="24" fill="#111">injects RULES.md into the</text>
  <text x="448" y="230" font-size="24" fill="#111">context · once per session</text>

  <line x1="850" y1="165" x2="902" y2="165" stroke="#111" stroke-width="3.5"/>
  <path d="M908 165 l-16 -9 v18 z" fill="#111"/>

  <!-- 3. claude's context -->
  <rect x="910" y="75" width="380" height="180" rx="24" fill="#f1f1f1" stroke="#111" stroke-width="3.5"/>
  <text x="938" y="115" font-size="24" fill="#555">claude's context</text>
  <rect x="938" y="132" width="324" height="44" rx="10" fill="#fff" stroke="#777" stroke-width="2"/>
  <text x="956" y="162" font-size="24" fill="#111">your prompt</text>
  <rect x="938" y="186" width="324" height="44" rx="10" fill="#fff" stroke="#777" stroke-width="2"/>
  <text x="956" y="216" font-size="24" fill="#111">+ RULES.md</text>

  <line x1="1290" y1="165" x2="1342" y2="165" stroke="#111" stroke-width="3.5"/>
  <path d="M1348 165 l-16 -9 v18 z" fill="#111"/>

  <!-- 4. decision diamond -->
  <polygon points="1480,78 1614,165 1480,252 1346,165" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <text x="1480" y="158" font-size="26" fill="#111" text-anchor="middle">loop-</text>
  <text x="1480" y="192" font-size="26" fill="#111" text-anchor="middle">shaped?</text>

  <!-- no branch -->
  <line x1="1616" y1="165" x2="1652" y2="165" stroke="#111" stroke-width="3.5"/>
  <path d="M1658 165 l-16 -9 v18 z" fill="#111"/>
  <text x="1624" y="148" font-size="22" fill="#555">no</text>
  <rect x="1662" y="110" width="210" height="110" rx="20" fill="#e7e7e7" stroke="#111" stroke-width="3"/>
  <text x="1767" y="158" font-size="24" fill="#111" text-anchor="middle">normal</text>
  <text x="1767" y="190" font-size="24" fill="#111" text-anchor="middle">reply</text>

  <!-- yes branch -->
  <line x1="1480" y1="252" x2="1480" y2="342" stroke="#111" stroke-width="3.5"/>
  <path d="M1480 348 l-9 -16 h18 z" fill="#111"/>
  <text x="1498" y="305" font-size="22" fill="#555">yes</text>

  <rect x="1150" y="350" width="620" height="200" rx="24" fill="#bfe8c0" stroke="#111" stroke-width="3.5"/>
  <text x="1178" y="390" font-size="22" fill="#555">claude</text>
  <text x="1178" y="430" font-size="26" fill="#111">"that's loop-shaped — run:</text>
  <text x="1178" y="470" font-size="26" fill="#111">/goal all tests pass and lint</text>
  <text x="1178" y="506" font-size="26" fill="#111">is clean, stop after 20 turns"</text>

  <line x1="1460" y1="550" x2="1460" y2="588" stroke="#111" stroke-width="3.5"/>
  <path d="M1460 594 l-9 -16 h18 z" fill="#111"/>
  <text x="1460" y="628" font-size="25" fill="#555" text-anchor="middle">you press enter — nothing runs by itself</text>
</svg>
